name: release

on:
  push:
    branches:
      - main

env:
  GPG_KEY_ID: 65DB550AE78300E6E355194C54B70F4A4F126E06
  GIT_AUTHOR_NAME: boatkit-ci
  GIT_AUTHOR_EMAIL: boatkit@rgst.io
  GIT_COMMITTER_NAME: boatkit-ci
  GIT_COMMITTER_EMAIL: boatkit@rgst.io

  # Predictable directories so we can run cache actions first.
  GOCACHE: /tmp/.cache/go-build
  GOMODCACHE: /tmp/.cache/go-mod

permissions:
  contents: write
  packages: write
  issues: write

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # We need to push w/ this token later
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: jdx/mise-action@v2
        with:
          experimental: true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Setup Git Signing
        env:
          GPG_SECRET_KEY: ${{ secrets.BOATKIT_CI_GPG_SECRET_KEY }}
        run: |-
          gpg --import <<< "${GPG_SECRET_KEY}"
          git config --global user.signingkey "${{ env.GPG_KEY_ID }}"
          git config --global commit.gpgsign true

      # Bumping logic
      - name: Get next version
        id: next_version
        run: |-
          NEXT_VERSION=$(mise run next-version)
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

          # If this version already exists, we're not releasing
          # anything. Cancel.
          if git rev-parse "${NEXT_VERSION}" &>/dev/null; then
            echo "Version ${NEXT_VERSION} already exists. Canceling release."
            exit 78
          fi
      - name: Create Tag
        run: |-
          git tag -s \
            -a "${{ steps.next_version.outputs.version }}" \
            -m "Release ${{ steps.next_version.outputs.version }}"
      - name: Push Tag
        run: |-
          git push origin "refs/tags/${{ steps.next_version.outputs.version }}"
      - name: Create Release
        run: |-
          gh release create "${{ steps.next_version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
