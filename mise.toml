[tools]
go = "1.26.5"
golangci-lint = "2.12"
node = "24"
pnpm = "11.1"
"go:gotest.tools/gotestsum" = "1.13.0"
"go:golang.org/x/tools/cmd/goimports" = "0.44.0"
"go:github.com/thenativeweb/get-next-version" = "v0.0.0-20260427193751-283f693d1042"

[tasks.codegen]
description = "Generate restream-based code"
run = ["go run ./cmd/codegen -project ."]

[tasks.test]
description = "Run tests"
run = ["gotestsum", "cd web && pnpm test"]

[tasks.lint]
description = "Run linters"
run = ["golangci-lint run", "cd web && pnpm lint"]

[tasks.web-build]
description = "Build the TypeScript web package"
run = ["pnpm --dir web run build"]

[tasks.web-publish-dry-run]
description = "Dry-run the TypeScript web package publish"
run = [
  "pnpm --dir web install --frozen-lockfile",
  "pnpm --dir web run lint",
  "pnpm --dir web test",
  "pnpm --dir web run build",
  "pnpm --dir web publish --dry-run --access public --no-git-checks",
]

[tasks.web-publish]
description = "Publish the TypeScript web package to the npm registry"
run = [
  "pnpm --dir web install --frozen-lockfile",
  "pnpm --dir web run lint",
  "pnpm --dir web test",
  "pnpm --dir web run build",
  "pnpm --dir web publish --access public --no-git-checks",
]

[tasks.next-version]
description = "Get the version number that would be released if a release was ran right now."
run = ["./.github/workflows/scripts/get-next-version.sh"]
